<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Shop - Connexion</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div id="topbar"></div>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Connexion</h2>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="votre@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Votre mot de passe"
                        required
                    >
                </div>

                <button type="submit" class="btn" id="submitBtn">Se connecter</button>
            </form>

            <div class="form-footer">
                Pas de compte ? <a href="/register">S'inscrire</a>
            </div>
        </div>
    </main>

    <footer id="contact" class="footer">
        <div class="container">
            <p>Projet pedagogique - ETML 183</p>
        </div>
    </footer>

    <script src="/js/nav.js"></script>
    <script>
        // Sélection des éléments HTML pour les manipuler en JS
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const submitBtn = document.getElementById('submitBtn');

        // Fonction pour afficher un message d'erreur
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block'; // Affiche la div
            successMessage.style.display = 'none'; // Cache le succès
        }

        // Fonction pour afficher un message de succès
        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block'; // Affiche la div
            errorMessage.style.display = 'none'; // Cache l'erreur
        }

        // Écouteur d'événement sur la soumission du formulaire
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Empêche le rechargement de la page

            // Récupération des valeurs saisies par l'utilisateur
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Feedback visuel : on désactive le bouton pendant l'attente
            submitBtn.disabled = true;
            submitBtn.textContent = 'Connexion en cours...';

            try {
                // Envoi d'une requête POST à l'API du serveur
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json' // On précise qu'on envoie du JSON
                    },
                    body: JSON.stringify({ email, password }) // Conversion des données en texte JSON
                });

                const data = await response.json();

                // Si la réponse n'est pas "OK" (ex: erreur 401 ou 400)
                if (!response.ok) {
                    throw new Error(data.error || 'Erreur de connexion');
                }

                // --- SI LA CONNEXION REUSSIT ---
            
                showSuccess('Connexion réussie! Redirection...');
                
                // Redirection après 1.5 secondes selon le rôle de l'utilisateur
                setTimeout(() => {
                    if (data.user.role === 'admin') {
                        window.location.href = '/admin'; // Page admin
                    } else {
                        window.location.href = '/profile'; // Page profil classique
                    }
                }, 1500);

            } catch (error) {
                // --- SI UNE ERREUR SURVIENT (Mauvais mot de passe, serveur HS, etc.) ---
                showError(error.message);
                submitBtn.disabled = false; // Réactive le bouton
                submitBtn.textContent = 'Se connecter'; // Remet le texte d'origine
            }
        });

        // Initialisation : on cache les messages au chargement de la page
        errorMessage.style.display = 'none';
        successMessage.style.display = 'none';
    </script>
</body>
</html>
